# JobPoll watchlist. User-editable; contains no secrets, so the repo can be
# public. Adding a company of an existing type = one entry under `sources:`.
#
# Migration trap: before adding a company, confirm its Apply links actually
# point at that ATS. A board a company migrated away from returns 200 with
# zero jobs forever (e.g. deel, mercury, kraken, and plaid all have empty
# abandoned boards). Probe first:
#   ashby:      https://api.ashbyhq.com/posting-api/job-board/{company}
#   greenhouse: https://boards-api.greenhouse.io/v1/boards/{company}/jobs
#   lever:      https://api.lever.co/v0/postings/{company}?mode=json
#
# FAANG (Meta/Apple/Amazon/Netflix/Google) run custom career sites with no
# public board API - their new-grad roles arrive via the SimplifyJobs feed
# below instead.

sources:
  # --- fintech ---
  - type: ashby
    company: wealthsimple
  - type: ashby
    company: ramp
  - type: ashby
    company: column
  - type: greenhouse
    company: stripe
  - type: greenhouse
    company: coinbase
  - type: greenhouse
    company: robinhood
  - type: greenhouse
    company: affirm
  - type: greenhouse
    company: chime
  - type: greenhouse
    company: brex
  - type: greenhouse
    company: adyen
  - type: greenhouse
    company: block

  # --- tech ---
  - type: ashby
    company: openai
  - type: ashby
    company: linear
  - type: ashby
    company: cursor
  - type: greenhouse
    company: anthropic
  - type: greenhouse
    company: databricks
  - type: greenhouse
    company: figma
  - type: greenhouse
    company: vercel
  - type: greenhouse
    company: duolingo
  - type: lever
    company: palantir

  # --- cross-company aggregators (cover FAANG and hundreds more) ---
  - type: github
    repo: SimplifyJobs/New-Grad-Positions
    path: .github/scripts/listings.json
    branch: dev
  - type: github
    repo: SimplifyJobs/Summer2026-Internships
    path: .github/scripts/listings.json
    branch: dev

# Filters target graduate / junior software roles (SWE, full stack, backend,
# platform, SRE, forward deployed) plus internships. Matching is
# case-insensitive SUBSTRING on the title - keywords like "sr " use spacing
# on purpose so they don't swallow "SRE".
filters:
  include_keywords: [engineer, developer, software, sre]
  exclude_keywords:
    - senior
    - "sr."
    - "sr "
    - staff
    - principal
    - distinguished
    - architect
    - lead
    - manager
    - director
    - "head of"
    - "vp "
  # Keep only Canada postings. Matching is case-insensitive SUBSTRING on the
  # location, so every term below was checked against real location strings
  # from the current sources before being added. Almost every Canadian
  # posting says "... Canada" or uses a ", XX" province code; city names
  # cover the SimplifyJobs shorthands ("Toronto", "NYC, Toronto, Remote in
  # Canada"). Substring traps to keep in mind when editing:
  #   - never add bare "us" (matches Australia), "markham" (Markham, IL),
  #     "surrey" or "halifax" or "victoria" (Surrey/Halifax UK, Victoria
  #     AUS), or ", ns" (matches "Sydney, NSW") - those cities' postings
  #     all carry ", ON" / ", BC" / ", Canada" markers anyway.
  #   - bare "remote" is deliberately absent: it would match "Remote US",
  #     "Remote - India" and every other foreign remote. Canadian remote
  #     postings say "Remote Canada", "Remote (Canada)", "Remote in
  #     Canada" or "CA-Remote", which "canada" / "ca-remote" catch.
  # Known gap: a bare countryless "Remote" is dropped; re-add "remote" here
  # if those turn out to matter. Accepted false positives: "Waterloo, IA"
  # and "Vancouver, WA" (one posting each in current data) ride in on the
  # city names, which are worth keeping for the shorthand-only postings.
  locations:
    - canada
    - ca-remote
    - can-remote
    # cities (unambiguous names only, see traps above)
    - toronto
    - vancouver
    - montreal
    - "montréal"
    - ottawa
    - waterloo
    - kitchener
    - mississauga
    - brampton
    - burnaby
    - calgary
    - edmonton
    - winnipeg
    - saskatoon
    # provinces
    - ontario
    - quebec
    - "québec"
    - alberta
    - british columbia
    - saskatchewan
    - manitoba
    - nova scotia
    - new brunswick
    - newfoundland
    # province codes, ", xx" comma forms
    - ", on"
    - ", bc"
    - ", ab"
    - ", qc"
    - ", mb"
    - ", sk"
    - ", nb"
  # Drop jobs whose posted date is older than this. Aggregator repos backfill
  # month-old postings that would otherwise alert as "new"; undated jobs pass.
  max_age_days: 14
  # More than this many new matches in one run -> one digest message.
  digest_threshold: 10
