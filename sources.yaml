# JobPoll watchlist. User-editable; contains no secrets, so the repo can be
# public. Adding a company of an existing type = one entry under `sources:`.
#
# Migration trap: before adding a company, confirm its Apply links actually
# point at that ATS. A board a company migrated away from returns 200 with
# zero jobs forever (e.g. deel, mercury, kraken, and plaid all have empty
# abandoned boards). Probe first:
#   ashby:      https://api.ashbyhq.com/posting-api/job-board/{company}
#   greenhouse: https://boards-api.greenhouse.io/v1/boards/{company}/jobs
#   lever:      https://api.lever.co/v0/postings/{company}?mode=json
#
# FAANG (Meta/Apple/Amazon/Netflix/Google) run custom career sites with no
# public board API - their new-grad roles arrive via the SimplifyJobs feed
# below instead.

sources:
  # --- fintech ---
  - type: ashby
    company: wealthsimple
  - type: ashby
    company: ramp
  - type: ashby
    company: column
  - type: greenhouse
    company: stripe
  - type: greenhouse
    company: coinbase
  - type: greenhouse
    company: robinhood
  - type: greenhouse
    company: affirm
  - type: greenhouse
    company: chime
  - type: greenhouse
    company: brex
  - type: greenhouse
    company: adyen
  - type: greenhouse
    company: block

  # --- tech ---
  - type: ashby
    company: openai
  - type: ashby
    company: linear
  - type: ashby
    company: cursor
  - type: greenhouse
    company: anthropic
  - type: greenhouse
    company: databricks
  - type: greenhouse
    company: figma
  - type: greenhouse
    company: vercel
  - type: greenhouse
    company: duolingo
  - type: lever
    company: palantir

  # --- cross-company aggregators (cover FAANG and hundreds more) ---
  - type: github
    repo: SimplifyJobs/New-Grad-Positions
    path: .github/scripts/listings.json
    branch: dev
  - type: github
    repo: SimplifyJobs/Summer2026-Internships
    path: .github/scripts/listings.json
    branch: dev

# Filters target graduate / junior software roles (SWE, full stack, backend,
# platform, SRE, forward deployed) plus internships. Matching is
# case-insensitive SUBSTRING on the title - keywords like "sr " use spacing
# on purpose so they don't swallow "SRE".
filters:
  include_keywords: [engineer, developer, software, sre]
  exclude_keywords:
    - senior
    - "sr."
    - "sr "
    - staff
    - principal
    - distinguished
    - architect
    - lead
    - manager
    - director
    - "head of"
    - "vp "
  # Keep only Canada / US postings. Matching is case-insensitive SUBSTRING on
  # the location, so every term below was checked against real location
  # strings from the current sources before being added. Substring traps to
  # keep in mind when editing:
  #   - never add bare "us" (matches Australia), "la" (Ireland, Poland),
  #     "sea" or "chi" (redundant anyway), "cambridge" (Cambridge, UK) or
  #     "durham" (Durham, UK) - those two are covered by ", ma" / ", nc".
  #   - state abbreviations are ", xx" comma forms; ", in", ", de", ", me"
  #     and ", ne" are deliberately missing (they match "Bengaluru, India",
  #     "Copenhagen, Denmark", "Mexico City, Mexico", "Amsterdam,
  #     Netherlands") - the cities they would cover are listed by name.
  #   - "remote" alone lets a few foreign-remote postings through
  #     ("Remote - India"), but US remote comes in too many shapes to
  #     enumerate ("US-Remote", "Remote (US)", "Remote in the US",
  #     "US-West Remote", bare "Remote") and missing those is worse.
  # Known gaps: SimplifyJobs' bare "US" and "LA" shorthands can't be matched
  # without those traps; the handful of such postings are dropped.
  locations:
    # countries / broad
    - canada
    - united states
    - usa
    - u.s.
    - north america
    - remote
    # canada: cities and provinces
    - toronto
    - vancouver
    - montreal
    - ottawa
    - waterloo
    - kitchener
    - mississauga
    - calgary
    - edmonton
    - winnipeg
    - halifax
    - quebec
    - ontario
    - alberta
    - british columbia
    - victoria, bc
    - ", on"
    - ", bc"
    - ", ab"
    - ", qc"
    - ", mb"
    # us: major hubs and shorthands (NYC / SF are SimplifyJobs forms)
    - new york
    - nyc
    - brooklyn
    - san francisco
    - san fransisco
    - sf
