# JobPoll watchlist. User-editable; contains no secrets, so the repo can be
# public. Adding a company of an existing type = one entry under `sources:`.
#
# Migration trap: before adding a company, confirm its Apply links actually
# point at that ATS. A board a company migrated away from returns 200 with
# zero jobs forever (e.g. deel, mercury, kraken, and plaid all have empty
# abandoned boards). Probe first:
#   ashby:      https://api.ashbyhq.com/posting-api/job-board/{company}
#   greenhouse: https://boards-api.greenhouse.io/v1/boards/{company}/jobs
#   lever:      https://api.lever.co/v0/postings/{company}?mode=json
#   workday:    POST https://{company}.{instance}.myworkdayjobs.com/wday/cxs/{company}/{site}/jobs
#               body {"appliedFacets":{},"limit":20,"offset":0,"searchText":""}
#
# Workday needs three values, all readable off the board URL: for
# https://nvidia.wd5.myworkdayjobs.com/NVIDIAExternalCareerSite the entry is
# company: nvidia / instance: wd5 / site: NVIDIAExternalCareerSite. The
# adapter fetches only the newest ~60 postings per poll (boards hold
# thousands), which the 5-minute cadence makes lossless.
#
# Slug collision trap: a live board can belong to a different company than
# the name suggests (ashby "runway" is Runway Financial, not Runway ML;
# "warp" is Warp the payroll startup, not warp.dev). After probing, read a
# couple of job titles to confirm it is the company you meant.
#
# FAANG (Meta/Apple/Amazon/Netflix/Google) run custom career sites with no
# public board API - their new-grad roles arrive via the SimplifyJobs feed
# below instead.

